<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <div class="logo">the casino.</div>
        <div class="header-right">
            <div class="balance-container">
                balance: $<span id="balanceDisplay">1000.00</span>
            </div>
            <div class="menu-container">
                <button class="hamburger-btn" onclick="toggleMenu()">menu</button>
                <div class="dropdown-menu" id="gameMenu">
                    <a onclick="openGame('slots')">🎰 slots</a>
                    <a onclick="openGame('wheel')">🎡 wheel</a>
                    <a onclick="openGame('blackjack')">🃏 blackjack</a>
                    <a onclick="openGame('crash')">📈 crash</a>
                    <a onclick="openGame('roulette')">🔴 roulette</a>
                </div>
            </div>
        </div>
    </header>

    <div id="slots" class="game-view active-view">
        <h1>slots</h1>
        <div class="slots-container">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>
        <div class="bet-controls">
            <span>bet:</span>
            <input type="number" id="slotsBet" class="bet-input" value="10" min="1">
            <button class="primary-btn" id="btnSlots" onclick="playSlots()">spin</button>
        </div>
        <div id="slotsStatus" class="game-status">ready to spin</div>
    </div>

    <div id="wheel" class="game-view">
        <h1>wheel of fortune</h1>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="spinWheel"></div>
        </div>
        <div class="bet-controls">
            <span>bet:</span>
            <input type="number" id="wheelBet" class="bet-input" value="10" min="1">
            <button class="primary-btn" id="btnWheel" onclick="playWheel()">spin</button>
        </div>
        <div id="wheelStatus" class="game-status"></div>
    </div>

    <div id="blackjack" class="game-view">
        <h1>blackjack</h1>
        <div>
            <p>dealer hand (<span id="dlrScore">0</span>)</p>
            <div class="cards-area" id="dlrCards"></div>
        </div>
        <div>
            <p>your hand (<span id="plrScore">0</span>)</p>
            <div class="cards-area" id="plrCards"></div>
        </div>
        <div class="bet-controls" id="bjBetPhase">
            <span>bet:</span>
            <input type="number" id="bjBet" class="bet-input" value="10" min="1">
            <button class="primary-btn" onclick="startBlackjack()">deal</button>
        </div>
        <div class="bj-controls" id="bjActionPhase" style="display: none;">
            <button class="primary-btn" onclick="bjHit()">hit</button>
            <button class="primary-btn danger-btn" onclick="bjStand()">stand</button>
        </div>
        <div id="bjStatus" class="game-status"></div>
    </div>

    <div id="crash" class="game-view">
        <h1>crash</h1>
        <div class="crash-graph" id="crashGraphContainer">
            <canvas id="crashCanvas" width="1000" height="400"></canvas>
            <div class="multiplier-text" id="crashMult">1.00x</div>
        </div>
        <div class="bet-controls">
            <span>bet:</span>
            <input type="number" id="crashBet" class="bet-input" value="10" min="1">
            <button class="primary-btn" id="btnCrash" onclick="startCrash()">start</button>
            <button class="primary-btn cashout-btn" id="btnCashout" onclick="cashoutCrash()" style="display: none;">cashout</button>
        </div>
        <div id="crashStatus" class="game-status"></div>
    </div>

    <div id="roulette" class="game-view">
        <h1>roulette</h1>
        <div class="roulette-result" id="rouletteResult">--</div>
        
        <div class="roulette-options">
            <label class="r-label r-red">
                <input type="radio" name="r_bet" value="red" checked> red (2x)
            </label>
            <label class="r-label r-green">
                <input type="radio" name="r_bet" value="green"> zero (36x)
            </label>
            <label class="r-label r-black">
                <input type="radio" name="r_bet" value="black"> black (2x)
            </label>
        </div>

        <div class="bet-controls">
            <span>bet:</span>
            <input type="number" id="rouletteBet" class="bet-input" value="10" min="1">
            <button class="primary-btn" id="btnRoulette" onclick="playRoulette()">spin</button>
        </div>
        <div id="rouletteStatus" class="game-status"></div>
    </div>

</body>
</html>
